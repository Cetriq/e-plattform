spring:
  # Database
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eplatform}
    username: ${SPRING_DATASOURCE_USERNAME:eplatform}
    password: ${SPRING_DATASOURCE_PASSWORD:devpassword}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  # Redis
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  # RabbitMQ
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

  # JPA
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # DevTools
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

# Meilisearch
meilisearch:
  host: ${MEILISEARCH_HOST:http://localhost:7700}
  api-key: ${MEILISEARCH_KEY:devmasterkey123}

# MinIO
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket:
    attachments: eplatform-attachments
    exports: eplatform-exports

# Logging (more verbose in dev)
logging:
  level:
    se.eplatform: DEBUG
    org.springframework.security: DEBUG
