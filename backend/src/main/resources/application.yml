spring:
  application:
    name: eplatform-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # JPA / Hibernate
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC

  # GraphQL
  graphql:
    graphiql:
      enabled: true
    schema:
      printer:
        enabled: true

  # Servlet
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

# Server
server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  error:
    include-message: always
    include-binding-errors: always

# Logging
logging:
  level:
    root: INFO
    se.eplatform: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Application specific
eplatform:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:8080
  security:
    jwt:
      issuer: ${JWT_ISSUER:eplatform}
      expiration: 3600
