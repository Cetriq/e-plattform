version: '3.9'

services:
  # ===================
  # DATABASER
  # ===================

  postgres:
    image: postgres:16-alpine
    container_name: eplatform-db
    environment:
      POSTGRES_DB: eplatform
      POSTGRES_USER: eplatform
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eplatform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eplatform-network

  redis:
    image: redis:7-alpine
    container_name: eplatform-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eplatform-network

  # ===================
  # SÖKNING
  # ===================

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: eplatform-search
    environment:
      MEILI_MASTER_KEY: ${MEILI_KEY:-devmasterkey123}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - eplatform-network

  # ===================
  # FILLAGRING
  # ===================

  minio:
    image: minio/minio:latest
    container_name: eplatform-files
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - eplatform-network

  # ===================
  # MEDDELANDEKÖ
  # ===================

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: eplatform-mq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - eplatform-network

  # ===================
  # BACKEND
  # ===================

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: eplatform-api
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eplatform
      SPRING_DATASOURCE_USERNAME: eplatform
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-devpassword}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILI_KEY:-devmasterkey123}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
    volumes:
      - ./backend/src:/app/src:delegated
      - gradle_cache:/root/.gradle
    ports:
      - "8080:8080"
      - "5005:5005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - eplatform-network

  # ===================
  # FRONTEND
  # ===================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: eplatform-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_GRAPHQL_URL: http://localhost:8080/graphql
    volumes:
      - ./frontend/src:/app/src:delegated
      - ./frontend/public:/app/public:delegated
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - eplatform-network

  # ===================
  # OBSERVABILITET
  # ===================

  prometheus:
    image: prom/prometheus:latest
    container_name: eplatform-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - eplatform-network

  grafana:
    image: grafana/grafana:latest
    container_name: eplatform-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - eplatform-network

networks:
  eplatform-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  gradle_cache:
